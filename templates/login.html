<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - EURL E-BUSINESS LAB</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            border-radius: 12px;
            padding: 44px 40px 36px;
            width: 380px;
            box-shadow: 0 12px 40px rgba(0,0,0,.35);
        }

        .logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo h1 {
            font-size: 19px;
            color: #1e3a5f;
            font-weight: bold;
            letter-spacing: .3px;
        }

        .logo p {
            font-size: 12px;
            color: #6b7280;
            margin-top: 5px;
        }

        .divider {
            border: none;
            border-top: 2px solid #e5e7eb;
            margin: 0 0 26px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            color: #374151;
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 10px 13px;
            font-size: 13px;
            outline: none;
            margin-bottom: 18px;
            transition: border-color .2s;
        }

        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,.1);
        }

        .error {
            background: #fef2f2;
            border: 1px solid #fca5a5;
            color: #dc2626;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 18px;
        }

        .btn-login {
            width: 100%;
            background: #1e3a5f;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background .2s;
            margin-top: 4px;
        }

        .btn-login:hover { background: #2563eb; }

        .hint {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: #9ca3af;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">
        <h1>EURL E-BUSINESS LAB</h1>
        <p>Gestion des Factures — Connexion</p>
    </div>
    <hr class="divider">

    {% if error %}
    <div class="error">&#9888; {{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
        <label for="username">Nom d'utilisateur</label>
        <input type="text" id="username" name="username"
               autocomplete="username" autofocus required>

        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password"
               autocomplete="current-password" required>

        <button type="submit" class="btn-login">Se connecter</button>
    </form>

    <p class="hint">Accès réservé au personnel autorisé</p>
</div>

</body>
</html>
